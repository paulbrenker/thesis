name: CICD

on:
  pull_request:
  workflow_dispatch:

env:
  PROJECT: "thesis"
  PROJECT_NAME: "Bachelor Thesis Paul Brenker: Relevance of Linter Rules"
  ACTION_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 1
    name: label
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.read-labels.outputs.labels }}
    steps:
      - uses: actions/labeler/@v5

      - name: Read current labels
        id: read-labels
        if: github.ref != 'refs/heads/main'
        uses: snnaplab/get-labels-action@v1.0.1

  build_thesis:
    name: Build LaTeX
    runs-on: ubuntu-latest
    needs: labeler
    if: github.ref == 'refs/head/main' || contains(needs.labeler.outputs.labels, 'text-change')
    strategy:
      matrix:
        directory: ["tex/thesis", "tex/expose"]
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ matrix.directory }}
          root_file: main.tex
          latexmk_use_xelatex: true

  build_python:
    name: Format, Lint, Test Python
    permissions:
      contents: read
    needs: labeler
    if: github.ref == 'refs/head/main' || contains(needs.labeler.outputs.labels, 'analysis-change')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: analysis
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-root

      - name: Format Check
        working-directory: analysis
        run: |
          poetry run black --check ./

      - name: Lint Modules
        working-directory: analysis
        run: |
          poetry run pylint src/

      - name: Test Modules
        working-directory: analysis
        run: |
          poetry run pytest --cache-clear --cov=src test/ --cov-fail-under=80 --cov-report term-missing

  build_typescript:
    name: Format, Lint, Test, Build TypeScript
    needs: labeler
    if: github.ref == 'refs/head/main' || contains(needs.labeler.outputs.labels, 'tool-change')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: tool/.node-version
          cache-dependency-path: tool/package-lock.json
          cache: npm

      - name: Install Dependencies
        working-directory: tool
        run: npm ci

      - name: Format Check
        working-directory: tool
        run: npm run format:check

      - name: Lint
        working-directory: tool
        run: npm run lint

      - name: Test
        working-directory: tool
        run: npm run test:cov

      - name: Build
        working-directory: tool
        run: npm run build
